# Render Blueprint — https://render.com/docs/blueprint-spec
# Create a MongoDB instance separately, then set MONGO_URI on this service.
services:
  - type: web
    name: team-task-manager
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: MONGO_URI
        sync: false
      - key: CLIENT_URL
        sync: false
